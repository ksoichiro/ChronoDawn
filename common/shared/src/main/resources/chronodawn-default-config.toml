# Chrono Dawn configuration.
#
# This file is read once at mod startup. Changes require a server (or
# single-player world) restart to take effect; /reload does NOT re-read
# this file. Already-generated chunks are not retroactively updated;
# new values apply only to chunks generated after the change.
#
# Invalid values fall back to defaults for that field. Unknown keys are
# ignored (with a warning in the log). To restore defaults for any
# field, delete the line; this file is overwritten only when missing.

schema_version = 1

[world.structures.ancient_ruins]
# Whether Ancient Ruins generate at all in the Overworld.
enabled = true

# Average distance (in chunks) between Ancient Ruins placement attempts.
# Lower = denser, higher = rarer. Must be > separation. Vanilla limit: 4096.
spacing = 56

# Minimum guaranteed distance (in chunks) between two Ancient Ruins.
# Must be < spacing.
separation = 20

# Random seed offset for placement; usually no reason to change this.
salt = 20005897

[world.ores.time_crystal]
# Whether Time Crystal ore generates in the Chrono dimension.
enabled = true

# Number of placement attempts per chunk. Lower = rarer, higher = denser.
# Each attempt generates one cluster (cluster size is fixed at the data-pack level).
count = 3

# Minimum and maximum Y level (absolute) where Time Crystal ore can spawn.
# The distribution between min and max is biased toward the middle (trapezoid).
y_min = 0
y_max = 48

[world.ores.entropy_crystal]
# Whether Entropy Crystal ore generates.
enabled = true

count = 4
y_min = 40
y_max = 100

[world.ores.temporal_amber]
# Whether Temporal Amber ore generates.
enabled = true

# Temporal Amber uses a uniform distribution (flat probability across the Y range)
# rather than trapezoid; tune y_min/y_max accordingly.
count = 4
y_min = -30
y_max = 20

[world.ores.clockstone]
# Whether Clockstone Ore generates in the Chrono dimension.
enabled = true

# Number of placement attempts per chunk. Lower = rarer, higher = denser.
# Each attempt generates one cluster (cluster size is fixed at the data-pack level).
count = 8

# Minimum and maximum Y level (absolute) where Clockstone Ore can spawn.
# Distribution between min and max is biased toward the middle (trapezoid).
y_min = -16
y_max = 80
